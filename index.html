<html>
 <title>from validation and major project </title> 
 <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewponit" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" > 
    <script scr="index.js"></script>
</head> 
<body>
    <div class="container">
        <form id="form" class="form" >
            <h1>Registration</h1>
            <div class="form-control">
                <label for="username">username</label>
                <input type="username" name="username" id="username" placeholder="enter username"   required><br>
                <span  style="color: red" id="username_error"></span>
              </div>
              <div class="form-control">
                <label for="email">email</label>
                <input id="email" name="email" id="email" placeholder="enter email" required><br>
                <span style="color: red" id="email_error"></span>

              </div>
              <div class="form-control">
                <label for="phone number">phone number</label>
                <input id="phone number" name="phone number" id="phone number" placeholder="+91XXXXXXXXXX" pattern="\+91\d{10}"><br><br>
               <a href="tel:1234567890">call now</a>
                <span style="color: red" id="phone number_error"></span>
              </div>

              <div class="form-control">
                <label for="password">password</label>
                <input id="password" name="password"  id="password" placeholder="enter password"  required><br>
                <span style="color: red" id="password_error"></span>

              </div>
              <div class="form-control">
                <label for="confirm password">conform password</label>
                <input id="confirm password" name="confirm password" id="confirm password"  placeholder="enter confirm password" required><br>
               <span style="color: red" id=" confirm password_error"></span>

              </div>
              <button type="submit">submit</button>
        </form>
    </div>
</body>


</html>
